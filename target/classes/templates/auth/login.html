<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - SportShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: white;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 20px;
            text-align: center;
        }
        .login-body {
            padding: 30px;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 10px;
            font-weight: bold;
        }
        .btn-login:hover {
            transform: scale(1.02);
            transition: 0.3s;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="fas fa-dumbbell fa-3x mb-2"></i>
        <h3 class="mb-0">SportShop</h3>
        <p class="mb-0">Đăng nhập để tiếp tục</p>
    </div>
    <div class="login-body">
        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-user me-2"></i>Tên đăng nhập
                </label>
                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-lock me-2"></i>Mật khẩu
                </label>
                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
            </div>
            <button type="submit" class="btn btn-login text-white w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="/register" class="text-decoration-none">Chưa có tài khoản? Đăng ký</a>
        </div>
    </div>
</div>
</body>
</html>
