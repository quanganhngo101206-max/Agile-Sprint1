<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Banner Hero Section -->
<div class="hero-section">
    <div class="container text-center">
        <h1 class="display-3 fw-bold mb-3">Chào mừng đến với SportShop</h1>
        <p class="lead mb-4">Nơi hội tụ những sản phẩm thể thao chất lượng hàng đầu</p>
        <a href="/products" class="btn btn-light btn-lg rounded-pill px-5">
            <i class="fas fa-shopping-bag me-2"></i>Mua sắm ngay
        </a>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-12 text-center mb-4">
            <h2 class="fw-bold">Sản phẩm nổi bật</h2>
            <div class="border-bottom border-danger w-25 mx-auto mb-3" style="height: 3px;"></div>
        </div>
        <div class="col-md-3 col-lg-3 mb-4" th:each="p : ${products}">
            <div class="card h-100 shadow-sm">
                <img th:src="@{${p.image != null ? p.image : '/images/default.jpg'}}" class="product-img" th:alt="${p.name}">
                <div class="card-body">
                    <h5 class="card-title" th:text="${p.name}"></h5>
                    <p class="card-text text-muted small" th:text="${#strings.abbreviate(p.description, 60)}"></p>
                    <div class="price" th:text="${#numbers.formatCurrency(p.price)}"></div>
                </div>
                <div class="card-footer bg-white border-0 text-center pb-3">
                    <a th:href="@{/product/detail/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary rounded-pill me-2">
                        <i class="fas fa-info-circle"></i> Chi tiết
                    </a>
                    <a th:href="@{/cart/add/{id}(id=${p.id})}" class="btn btn-sm btn-primary rounded-pill">
                        <i class="fas fa-cart-plus"></i> Thêm
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
