<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="fw-bold mb-4">Danh sách sản phẩm</h2>

    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="fas fa-filter me-2"></i>Lọc sản phẩm</h5>
                </div>
                <div class="card-body">
                    <h6>Danh mục</h6>
                    <ul class="list-unstyled">
                        <li><a href="/products" class="text-decoration-none">Tất cả</a></li>
                        <li th:each="cat : ${categories}">
                            <a th:href="@{/products/filter(categoryId=${cat.id})}" class="text-decoration-none">
                                <span th:text="${cat.name}"></span>
                            </a>
                        </li>
                    </ul>
                    <hr>
                    <h6>Khoảng giá</h6>
                    <form action="/products/filter" method="get">
                        <div class="mb-2">
                            <input type="radio" name="priceRange" value="0-100000"> Dưới 100k<br>
                            <input type="radio" name="priceRange" value="100000-300000"> 100k - 300k<br>
                            <input type="radio" name="priceRange" value="300000-500000"> 300k - 500k<br>
                            <input type="radio" name="priceRange" value="500000-1000000"> 500k - 1tr<br>
                            <input type="radio" name="priceRange" value="1000000-99999999"> Trên 1tr<br>
                        </div>
                        <input type="hidden" name="categoryId" th:value="${param.categoryId}">
                        <button type="submit" class="btn btn-primary btn-sm w-100 rounded-pill">
                            <i class="fas fa-search"></i> Áp dụng
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <div th:if="${#lists.isEmpty(products)}" class="alert alert-warning text-center">
                <i class="fas fa-exclamation-triangle me-2"></i>Không tìm thấy sản phẩm nào!
            </div>

            <div class="row">
                <div class="col-md-4 col-lg-4 mb-4" th:each="p : ${products}">
                    <div class="card h-100 shadow-sm">
                        <img th:src="@{${p.image != null ? p.image : '/images/default.jpg'}}" class="product-img" th:alt="${p.name}">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${p.name}"></h5>
                            <p class="card-text text-muted small" th:text="${#strings.abbreviate(p.description, 50)}"></p>
                            <div class="price" th:text="${#numbers.formatCurrency(p.price)}"></div>
                            <small class="text-muted">Còn: <span th:text="${p.quantity}"></span> sp</small>
                        </div>
                        <div class="card-footer bg-white border-0 text-center pb-3">
                            <a th:href="@{/product/detail/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary rounded-pill me-2">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="@{/cart/add/{id}(id=${p.id})}" class="btn btn-sm btn-primary rounded-pill"
                               th:classappend="${p.quantity <= 0} ? 'disabled' : ''">
                                <i class="fas fa-cart-plus"></i> Thêm
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
