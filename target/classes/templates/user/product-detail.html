<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="row" th:if="${product != null}">
        <div class="col-md-5">
            <img th:src="@{${product.image != null ? product.image : '/images/default.jpg'}}"
                 class="img-fluid rounded shadow-sm" th:alt="${product.name}">
        </div>
        <div class="col-md-7">
            <h2 class="fw-bold" th:text="${product.name}"></h2>
            <div class="price display-5 text-danger mb-3" th:text="${#numbers.formatCurrency(product.price)}"></div>
            <div class="mb-3">
                <span class="badge bg-success" th:if="${product.quantity > 0}">Còn hàng</span>
                <span class="badge bg-danger" th:if="${product.quantity <= 0}">Hết hàng</span>
                <span class="text-muted ms-2">Số lượng: <span th:text="${product.quantity}"></span></span>
            </div>
            <div class="mb-4">
                <h5>Mô tả sản phẩm:</h5>
                <p th:text="${product.description}"></p>
            </div>
            <div class="d-flex gap-3">
                <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn btn-primary btn-lg rounded-pill px-5" th:if="${product.quantity > 0}">
                    <i class="fas fa-cart-plus me-2"></i>Thêm vào giỏ
                </a>
                <a href="/products" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
                    <i class="fas fa-arrow-left me-2"></i>Quay lại
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
