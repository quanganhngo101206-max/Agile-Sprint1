<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
  <h2 class="fw-bold mb-4"><i class="fas fa-history me-2"></i>Lịch sử đơn hàng</h2>

  <div th:if="${#lists.isEmpty(orders)}">
    <div class="alert alert-info text-center">
      <i class="fas fa-info-circle me-2"></i>Bạn chưa có đơn hàng nào!
      <a href="/products" class="alert-link">Mua sắm ngay</a>
    </div>
  </div>

  <div class="row" th:each="order : ${orders}">
    <div class="col-12 mb-4">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
          <div class="d-flex justify-content-between align-items-center">
            <span><i class="fas fa-receipt me-2"></i>Đơn hàng #<span th:text="${order.id}"></span></span>
            <span>
              <span class="badge" th:classappend="${order.status == 'PENDING'} ? 'bg-warning' :
                                                     (${order.status == 'SHIPPING'} ? 'bg-info' : 'bg-success')"
                    th:text="${order.status == 'PENDING'} ? 'Đang xử lý' :
                           (${order.status == 'SHIPPING'} ? 'Đang giao' : 'Hoàn tất')">
              </span>
            </span>
          </div>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-8">
              <p><strong>Ngày đặt:</strong> <span th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
              <p><strong>Địa chỉ:</strong> <span th:text="${order.shippingAddress} ?: 'Chưa cập nhật'"></span></p>
              <div th:each="detail : ${order.orderDetails}">
                <span th:text="${detail.product.name} + ' x ' + ${detail.quantity} + ' = ' + ${#numbers.formatCurrency(detail.price * detail.quantity)}"></span><br>
              </div>
            </div>
            <div class="col-md-4 text-end">
              <h5 class="text-danger">Tổng: <span th:text="${#numbers.formatCurrency(order.totalPrice)}"></span></h5>
              <span class="badge bg-secondary" th:text="${order.paymentMethod} == 'COD' ? 'COD' :
                                                         (${order.paymentMethod} == 'BANK' ? 'Chuyển khoản' : 'Momo')">
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
