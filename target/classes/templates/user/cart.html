<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="fw-bold mb-4"><i class="fas fa-shopping-cart me-2"></i>Giỏ hàng của bạn</h2>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(cartList)}">
        <div class="alert alert-info text-center">
            <i class="fas fa-info-circle me-2"></i>Giỏ hàng của bạn đang trống!
            <a href="/products" class="alert-link">Tiếp tục mua sắm</a>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(cartList)}">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${cartList}">
                    <td>
                        <img th:src="@{${c.product.image != null ? c.product.image : '/images/default.jpg'}}" width="60" class="rounded">
                    </td>
                    <td th:text="${c.product.name}"></td>
                    <td th:text="${#numbers.formatCurrency(c.product.price)}"></td>
                    <td>
                        <form th:action="@{/cart/update/{id}(id=${c.id})}" method="post" class="d-flex">
                            <input type="number" name="quantity" th:value="${c.quantity}"
                                   min="1" th:max="${c.product.quantity}"
                                   class="form-control form-control-sm" style="width: 70px;">
                            <button type="submit" class="btn btn-sm btn-outline-secondary ms-2">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </form>
                    </td>
                    <td th:text="${#numbers.formatCurrency(c.product.price * c.quantity)}"></td>
                    <td>
                        <a th:href="@{/cart/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Xóa sản phẩm này khỏi giỏ hàng?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="text-end mt-3">
            <h4>Tổng tiền: <span class="text-danger" th:text="${#numbers.formatCurrency(totalPrice)}"></span></h4>
            <a href="/checkout" class="btn btn-success btn-lg rounded-pill px-5 mt-3">Thanh toán</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
