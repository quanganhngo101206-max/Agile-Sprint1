<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{admin/admin-layout :: layout}">
  <div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div>
        <h2 class="fw-bold mb-1">
          <i class="fas fa-truck me-2 text-primary"></i>Quản lý đơn hàng
        </h2>
        <p class="text-muted small mb-0">Theo dõi và xử lý đơn hàng của khách hàng</p>
      </div>
      <div class="d-flex gap-2">
        <div class="dropdown">
          <button class="btn btn-outline-secondary rounded-pill dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="fas fa-filter me-1"></i>Lọc theo trạng thái
          </button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#" onclick="filterStatus('all')">Tất cả</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterStatus('PENDING')">⏳ Đang xử lý</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterStatus('CONFIRMED')">✅ Đã xác nhận</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterStatus('SHIPPING')">🚚 Đang giao</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterStatus('DELIVERED')">📦 Đã giao</a></li>
            <li><a class="dropdown-item" href="#" onclick="filterStatus('CANCELLED')">❌ Đã hủy</a></li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Orders table -->
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="orderTable">
            <thead class="bg-light">
            <tr>
              <th class="ps-4">Mã đơn</th>
              <th>Khách hàng</th>
              <th>Ngày đặt</th>
              <th>Tổng tiền</th>
              <th>Thanh toán</th>
              <th>Trạng thái</th>
              <th class="text-center pe-4">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}" th:data-status="${order.status}">
              <td class="ps-4">
                <span class="fw-bold text-primary">#<span th:text="${order.id}"></span></span>
              </td>
              <td>
                <div class="d-flex align-items-center">
                  <div class="bg-secondary bg-opacity-10 rounded-circle me-2 p-2">
                    <i class="fas fa-user text-secondary fa-sm"></i>
                  </div>
                  <div>
                    <div class="fw-bold" th:text="${order.user.fullName}"></div>
                    <small class="text-muted" th:text="${order.user.phone}"></small>
                  </div>
                </div>
              </td>
              <td>
                <span th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy')}"></span>
                <br>
                <small class="text-muted" th:text="${#dates.format(order.orderDate, 'HH:mm')}"></small>
              </td>
              <td>
                <span class="fw-bold text-success" th:text="${#numbers.formatCurrency(order.totalPrice)}"></span>
              </td>
              <td>
                                    <span class="badge rounded-pill px-3 py-2"
                                          th:classappend="${order.paymentMethod == 'COD'} ? 'bg-secondary bg-opacity-10 text-secondary' : 'bg-primary bg-opacity-10 text-primary'"
                                          th:text="${order.paymentMethod == 'COD'} ? '💰 COD' : '🏦 Chuyển khoản'">
                                    </span>
              </td>
              <td>
                                    <span class="badge rounded-pill px-3 py-2"
                                          th:classappend="${order.status == 'PENDING'} ? 'bg-warning text-dark' :
                                                          (${order.status == 'CONFIRMED'} ? 'bg-info text-white' :
                                                          (${order.status == 'SHIPPING'} ? 'bg-primary text-white' :
                                                          (${order.status == 'DELIVERED'} ? 'bg-success text-white' : 'bg-danger text-white')))"
                                          th:text="${order.status == 'PENDING'} ? '⏳ Đang xử lý' :
                                                 (${order.status == 'CONFIRMED'} ? '✅ Đã xác nhận' :
                                                 (${order.status == 'SHIPPING'} ? '🚚 Đang giao' :
                                                 (${order.status == 'DELIVERED'} ? '📦 Đã giao' : '❌ Đã hủy')))">
                                    </span>
              </td>
              <td class="text-center pe-4">
                <a th:href="@{/admin/orders/detail/{id}(id=${order.id})}"
                   class="btn btn-sm btn-outline-primary rounded-pill px-3">
                  <i class="fas fa-eye me-1"></i>Chi tiết
                </a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders)}">
              <td colspan="7" class="text-center py-5">
                <i class="fas fa-inbox fa-3x text-muted mb-2"></i>
                <p class="text-muted mb-0">Chưa có đơn hàng nào</p>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function filterStatus(status) {
    const rows = document.querySelectorAll('#orderTable tbody tr');
    rows.forEach(row => {
      if (row.cells.length < 7) return;
      if (status === 'all' || row.getAttribute('data-status') === status) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  }
</script>

</body>
</html>
