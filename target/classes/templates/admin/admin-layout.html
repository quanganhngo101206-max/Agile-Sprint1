<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - SportShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }
    body {
      background: #f5f7fb;
    }
    /* Sidebar */
    .sidebar {
      width: 280px;
      height: 100vh;
      position: fixed;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      color: white;
      transition: all 0.3s;
      z-index: 1000;
      box-shadow: 2px 0 20px rgba(0,0,0,0.08);
    }
    .sidebar .logo {
      padding: 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar .logo h4 {
      font-weight: 700;
      margin: 0;
      font-size: 1.5rem;
    }
    .sidebar .logo h4 i {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sidebar .logo p {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-top: 4px;
    }
    .sidebar .nav-item {
      padding: 8px 16px;
      margin: 4px 0;
    }
    .sidebar .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s;
      font-weight: 500;
    }
    .sidebar .nav-link:hover {
      background: rgba(255,255,255,0.08);
      color: white;
      transform: translateX(4px);
    }
    .sidebar .nav-link.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .sidebar .nav-link i {
      font-size: 1.2rem;
      width: 24px;
    }
    .sidebar .nav-link span {
      font-size: 0.9rem;
    }
    .sidebar .bottom-menu {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    /* Content */
    .content {
      margin-left: 280px;
      padding: 20px 30px;
      min-height: 100vh;
    }
    /* Top bar */
    .top-bar {
      background: white;
      border-radius: 20px;
      padding: 12px 24px;
      margin-bottom: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .greeting h5 {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }
    .greeting small {
      font-size: 0.75rem;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .user-avatar:hover {
      transform: scale(1.05);
    }
    .notification-badge {
      position: relative;
      cursor: pointer;
    }
    .notification-badge .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      font-size: 10px;
      padding: 2px 6px;
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .content {
        margin-left: 0;
      }
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
  </style>
</head>
<body>

<div th:fragment="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <div class="d-flex align-items-center gap-2">
        <div class="logo-icon">
          <i class="bi bi-gem"></i>
        </div>
        <div>
          <h4 class="mb-0">SportShop</h4>
          <p class="mb-0 small opacity-50">Administrator Panel</p>
        </div>
      </div>
    </div>

    <div class="nav-menu">
      <div class="nav-item">
        <a th:href="@{/admin/dashboard}" class="nav-link"
           th:classappend="${currentPath == '/admin/dashboard'} ? 'active' : ''">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </div>
      <div class="nav-item">
        <a th:href="@{/admin/orders}" class="nav-link"
           th:classappend="${currentPath == '/admin/orders'} ? 'active' : ''">
          <i class="bi bi-bag"></i>
          <span>Đơn hàng</span>
        </a>
      </div>
      <div class="nav-item">
        <a th:href="@{/admin/products}" class="nav-link"
           th:classappend="${currentPath == '/admin/products'} ? 'active' : ''">
          <i class="bi bi-box"></i>
          <span>Sản phẩm</span>
        </a>
      </div>
      <div class="nav-item">
        <a th:href="@{/admin/users}" class="nav-link"
           th:classappend="${currentPath == '/admin/users'} ? 'active' : ''">
          <i class="bi bi-people"></i>
          <span>Người dùng</span>
        </a>
      </div>
    </div>

    <div class="bottom-menu">
      <div class="nav-item">
        <a href="/logout" class="nav-link text-danger">
          <i class="bi bi-box-arrow-right"></i>
          <span>Đăng xuất</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="top-bar">
      <div class="greeting">
        <h5 class="fw-bold mb-0">
          <span th:text="${session.user.fullName}">Quản trị viên</span>
        </h5>
        <small class="text-muted">Chúc bạn một ngày làm việc hiệu quả</small>
      </div>
      <div class="d-flex align-items-center gap-3">
        <div class="notification-badge">
          <i class="bi bi-bell fs-5 text-muted"></i>
          <span class="badge bg-danger rounded-pill">3</span>
        </div>
        <div class="user-avatar" data-bs-toggle="dropdown">
          <span th:text="${#strings.substring(session.user.fullName, 0, 1)}">A</span>
        </div>
      </div>
    </div>
    <div th:insert="~{::content}"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
