<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{admin/admin-layout :: layout}">
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-users me-2"></i>Quản lý người dùng</h2>
            <a href="/admin/users/create" class="btn btn-success">
                <i class="fas fa-plus me-2"></i>Thêm người dùng
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th>SĐT</th>
                            <th>Vai trò</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.username}"></td>
                            <td th:text="${u.fullName}"></td>
                            <td th:text="${u.email}"></td>
                            <td th:text="${u.phone}"></td>
                            <td>
                                    <span class="badge" th:classappend="${u.role == 'ADMIN'} ? 'bg-danger' :
                                                                           (${u.role == 'STAFF'} ? 'bg-warning' : 'bg-secondary')"
                                          th:text="${u.role}"></span>
                            </td>
                            <td>
                                <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/admin/users/delete/{id}(id=${u.id})}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('Xóa người dùng này?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
