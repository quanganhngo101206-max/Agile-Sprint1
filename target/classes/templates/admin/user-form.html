<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{admin/admin-layout :: layout}">
    <div th:fragment="content">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0" th:text="${user.id} ? 'Sửa người dùng' : 'Thêm người dùng'">
                    Thông tin người dùng
                </h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Họ tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-control">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Số điện thoại</label>
                            <input type="tel" th:field="*{phone}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Vai trò</label>
                        <select th:field="*{role}" class="form-control">
                            <option value="CUSTOMER">Khách hàng</option>
                            <option value="STAFF">Nhân viên</option>
                            <option value="ADMIN">Quản trị viên</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Lưu</button>
                    <a href="/admin/users" class="btn btn-secondary">Quay lại</a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
