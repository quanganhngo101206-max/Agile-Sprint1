<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{admin/admin-layout :: layout}">
  <div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div>
        <h2 class="fw-bold mb-1">
          <i class="fas fa-box me-2 text-primary"></i>Quản lý sản phẩm
        </h2>
        <p class="text-muted small mb-0">Quản lý danh sách sản phẩm trong cửa hàng</p>
      </div>
      <div>
        <a href="/admin/products/create" class="btn btn-primary rounded-pill px-4 shadow-sm">
          <i class="fas fa-plus me-2"></i>Thêm sản phẩm
        </a>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body p-3">
        <div class="row g-2 align-items-center">
          <div class="col-md-4">
            <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="fas fa-search text-muted"></i>
                            </span>
              <input type="text" class="form-control border-start-0" placeholder="Tìm kiếm sản phẩm..." id="searchInput">
            </div>
          </div>
          <div class="col-md-3">
            <select class="form-select" id="categoryFilter">
              <option value="">Tất cả danh mục</option>
              <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
          </div>
          <div class="col-md-3">
            <select class="form-select" id="stockFilter">
              <option value="">Tất cả</option>
              <option value="instock">Còn hàng</option>
              <option value="outofstock">Hết hàng</option>
            </select>
          </div>
          <div class="col-md-2">
            <button class="btn btn-outline-secondary w-100 rounded-pill" onclick="resetFilters()">
              <i class="fas fa-undo-alt me-1"></i>Làm mới
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Products table -->
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="productTable">
            <thead class="bg-light">
            <tr>
              <th class="ps-4" style="width: 60px">ID</th>
              <th style="width: 80px">Ảnh</th>
              <th>Tên sản phẩm</th>
              <th>Danh mục</th>
              <th>Giá</th>
              <th>Số lượng</th>
              <th>Trạng thái</th>
              <th class="text-center pe-4" style="width: 120px">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${products}">
              <td class="ps-4 fw-bold text-primary" th:text="${p.id}"></td>
              <td>
                <img th:src="@{${p.image != null ? p.image : '/images/default.jpg'}}"
                     width="50" height="50" class="rounded-3 object-fit-cover shadow-sm">
              </td>
              <td>
                <div class="fw-bold" th:text="${p.name}"></div>
                <small class="text-muted" th:text="${#strings.abbreviate(p.description, 40)}"></small>
              </td>
              <td>
                                    <span class="badge bg-info bg-opacity-10 text-info rounded-pill px-3 py-2"
                                          th:text="${p.category != null ? p.category.name : 'Chưa phân loại'}">
                                    </span>
              </td>
              <td>
                <span class="fw-bold text-success" th:text="${#numbers.formatCurrency(p.price)}"></span>
              </td>
              <td>
                <span class="fw-bold" th:text="${p.quantity}"></span>
              </td>
              <td>
                                    <span class="badge rounded-pill px-3 py-2"
                                          th:classappend="${p.quantity > 0} ? 'bg-success bg-opacity-10 text-success' : 'bg-danger bg-opacity-10 text-danger'"
                                          th:text="${p.quantity > 0} ? '● Còn hàng' : '● Hết hàng'">
                                    </span>
              </td>
              <td class="text-center pe-4">
                <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                   class="btn btn-sm btn-outline-warning rounded-pill me-1">
                  <i class="fas fa-edit"></i>
                </a>
                <a th:href="@{/admin/products/delete/{id}(id=${p.id})}"
                   class="btn btn-sm btn-outline-danger rounded-pill"
                   onclick="return confirm('Xóa sản phẩm ${p.name}?')">
                  <i class="fas fa-trash"></i>
                </a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
              <td colspan="8" class="text-center py-5">
                <i class="fas fa-box-open fa-3x text-muted mb-2"></i>
                <p class="text-muted mb-0">Chưa có sản phẩm nào</p>
                <a href="/admin/products/create" class="btn btn-sm btn-primary rounded-pill mt-3">
                  <i class="fas fa-plus me-1"></i>Thêm sản phẩm đầu tiên
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Filter functionality
  const searchInput = document.getElementById('searchInput');
  const categoryFilter = document.getElementById('categoryFilter');
  const stockFilter = document.getElementById('stockFilter');
  const table = document.getElementById('productTable');
  const rows = table.getElementsByTagName('tbody')[0].getElementsByTagName('tr');

  function filterTable() {
    const searchTerm = searchInput.value.toLowerCase();
    const category = categoryFilter.value;
    const stock = stockFilter.value;

    for (let row of rows) {
      if (row.cells.length < 8) continue;

      const name = row.cells[2].innerText.toLowerCase();
      const categoryText = row.cells[3].innerText;
      const quantity = parseInt(row.cells[5].innerText);

      let show = true;

      if (searchTerm && !name.includes(searchTerm)) show = false;
      if (category && !categoryText.includes(category)) show = false;
      if (stock === 'instock' && quantity <= 0) show = false;
      if (stock === 'outofstock' && quantity > 0) show = false;

      row.style.display = show ? '' : 'none';
    }
  }

  function resetFilters() {
    searchInput.value = '';
    categoryFilter.value = '';
    stockFilter.value = '';
    filterTable();
  }

  searchInput.addEventListener('keyup', filterTable);
  categoryFilter.addEventListener('change', filterTable);
  stockFilter.addEventListener('change', filterTable);
</script>

<style>
  .object-fit-cover {
    object-fit: cover;
  }
  .bg-opacity-10 {
    --bs-bg-opacity: 0.1;
  }
  .table > :not(caption) > * > * {
    padding: 1rem 0.5rem;
  }
</style>

</body>
</html>
