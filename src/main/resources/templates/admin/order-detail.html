<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div th:replace="~{admin/admin-layout :: layout}">
    <div th:fragment="content">
        <div class="card shadow-sm" th:if="${order != null}">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Chi tiết đơn hàng #<span th:text="${order.id}"></span></h5>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <p><strong>Khách hàng:</strong> <span th:text="${order.user.fullName}"></span></p>
                        <p><strong>Email:</strong> <span th:text="${order.user.email}"></span></p>
                        <p><strong>SĐT:</strong> <span th:text="${order.user.phone}"></span></p>
                        <p><strong>Địa chỉ giao hàng:</strong> <span th:text="${order.shippingAddress}"></span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Ngày đặt:</strong> <span th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
                        <p><strong>Phương thức TT:</strong>
                            <span th:text="${order.paymentMethod == 'COD' ? 'COD' : (order.paymentMethod == 'BANK' ? 'Chuyển khoản' : 'Momo')}"></span>
                        </p>
                        <p><strong>Trạng thái:</strong>
                        <form th:action="@{/admin/orders/update-status/{id}(id=${order.id})}" method="post" class="d-inline">
                            <select name="status" class="form-select form-select-sm d-inline w-auto" onchange="this.form.submit()">
                                <option value="PENDING" th:selected="${order.status == 'PENDING'}">Đang xử lý</option>
                                <option value="CONFIRMED" th:selected="${order.status == 'CONFIRMED'}">Đã xác nhận</option>
                                <option value="SHIPPING" th:selected="${order.status == 'SHIPPING'}">Đang giao hàng</option>
                                <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Đã giao</option>
                                <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Đã hủy</option>
                            </select>
                        </form>
                        </p>
                        <p><strong>Tổng tiền:</strong> <span class="text-danger fw-bold" th:text="${#numbers.formatCurrency(order.totalPrice)}"></span></p>
                    </div>
                </div>

                <h6>Danh sách sản phẩm</h6>
                <table class="table table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>Thành tiền</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="detail : ${order.orderDetails}">
                        <td th:text="${detail.product.name}"></td>
                        <td th:text="${detail.quantity}"></td>
                        <td th:text="${#numbers.formatCurrency(detail.price)}"></td>
                        <td th:text="${#numbers.formatCurrency(detail.price * detail.quantity)}"></td>
                    </tr>
                    </tbody>
                </table>

                <a href="/admin/orders" class="btn btn-secondary">Quay lại</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
